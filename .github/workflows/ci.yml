name: ci
on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            file: ./backend/Dockerfile
            image: ghcr.io/${{ github.repository }}-backend
          - service: frontend
            context: ./frontend
            file: ./frontend/Dockerfile
            image: ghcr.io/${{ github.repository }}-frontend
          - service: frontend_sitcom
            context: ./frontend_sitcom
            file: ./frontend_sitcom/Dockerfile
            image: ghcr.io/${{ github.repository }}-frontend-sitcom
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3  # Buildx für Multi-Arch
        # optional: docker/setup-qemu-action@v3, wenn nötig

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}             # <- Dockerfile-Pfad je Service
          platforms: linux/amd64,linux/arm64   # falls du nur amd64 brauchst, auf amd64 reduzieren
          push: true
          tags: ${{ steps.meta.outputs.tags }} # Tags je Service
          labels: ${{ steps.meta.outputs.labels }}

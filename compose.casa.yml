services:
  backend:
    # Defaults to the current directory when run from the repo.
    # For CasaOS/server installs, point LEAGUECLIPS_SOURCE_DIR at a local clone.
    build: ${LEAGUECLIPS_SOURCE_DIR:-.}/backend
    container_name: clips_backend
    restart: unless-stopped
    user: "1000:1000"
    environment:
      FLASK_ENV: production
      FLASK_APP: app
      LEAGUECLIPS_TEMP_DIR: /tmp
      LEAGUECLIPS_AI_WHISPER_MODEL: medium
      LEAGUECLIPS_AI_DEVICE: cpu
      LEAGUECLIPS_AI_COMPUTE_TYPE: int8
      LEAGUECLIPS_PROGRESS_UPDATE_SECONDS: "0.75"
      LEAGUECLIPS_YTDLP_PROGRESS_LOG_SECONDS: "10"
      LEAGUECLIPS_YTDLP_SOCKET_TIMEOUT_SECONDS: "90"
      LEAGUECLIPS_YTDLP_RETRIES: "15"
      LEAGUECLIPS_YTDLP_FRAGMENT_RETRIES: "20"
      LEAGUECLIPS_YTDLP_DOWNLOAD_ATTEMPTS: "3"
      LEAGUECLIPS_YTDLP_HTTP_CHUNK_SIZE_MB: "16"
      LEAGUECLIPS_OLLAMA_TIMEOUT_SECONDS: "90"
      LEAGUECLIPS_OLLAMA_SPLIT_MARKERS_ENABLED: "true"
      LEAGUECLIPS_OLLAMA_HOST: http://ollama:11434
      LEAGUECLIPS_OLLAMA_MODEL: qwen2.5:7b-instruct
      LEAGUECLIPS_AUTO_SYNAPSE_ENABLED: "true"
      LEAGUECLIPS_AUTO_SYNAPSE_AUTO_SUBTITLES: "true"
      LEAGUECLIPS_AUTO_SYNAPSE_POLL_SECONDS: "43200"
      LEAGUECLIPS_AUTO_SYNAPSE_FEED_LIMIT: "10"
      LEAGUECLIPS_AUTO_SYNAPSE_LOCK_TTL_SECONDS: "1800"
      LEAGUECLIPS_AUTO_SYNAPSE_STALE_LOCK_SECONDS: "900"
      LEAGUECLIPS_AUTO_SYNAPSE_TASK_STALE_SECONDS: "86400"
      LEAGUECLIPS_AUTO_SYNAPSE_MAX_VIDEO_FAILURES: "2"
      HOME: /data
      XDG_CACHE_HOME: /data/.cache
      HF_HOME: /data/.cache/huggingface
      TRANSFORMERS_CACHE: /data/.cache/huggingface
      # REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - ollama
    ports:
      - "5000:5000"                    # nur intern
    volumes:
      - ${CLIPSCREATOR_APPDATA_DIR:-/DATA/AppData/ClipsCreator}/backend-data:/data
      - ${CLIPSCREATOR_APPDATA_DIR:-/DATA/AppData/ClipsCreator}/backend-screens:/screens
      - ${CLIPSCREATOR_APPDATA_DIR:-/DATA/AppData/ClipsCreator}/backend-videos:/videos
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/healthz')"]
      interval: 20s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  celery:
    build: ${LEAGUECLIPS_SOURCE_DIR:-.}/backend
    container_name: clips_celery_worker
    restart: unless-stopped
    user: "1000:1000"
    command: celery -A app.tasks worker --loglevel=info
    depends_on:
      - redis
      - ollama
    environment:
      LEAGUECLIPS_TEMP_DIR: /tmp
      LEAGUECLIPS_AI_WHISPER_MODEL: medium
      LEAGUECLIPS_AI_DEVICE: cpu
      LEAGUECLIPS_AI_COMPUTE_TYPE: int8
      LEAGUECLIPS_PROGRESS_UPDATE_SECONDS: "0.75"
      LEAGUECLIPS_OLLAMA_TIMEOUT_SECONDS: "90"
      LEAGUECLIPS_OLLAMA_SPLIT_MARKERS_ENABLED: "true"
      LEAGUECLIPS_OLLAMA_HOST: http://ollama:11434
      LEAGUECLIPS_OLLAMA_MODEL: qwen2.5:7b-instruct
      HOME: /data
      XDG_CACHE_HOME: /data/.cache
      HF_HOME: /data/.cache/huggingface
      TRANSFORMERS_CACHE: /data/.cache/huggingface
    volumes:
      - ${CLIPSCREATOR_APPDATA_DIR:-/DATA/AppData/ClipsCreator}/backend-data:/data
      - ${CLIPSCREATOR_APPDATA_DIR:-/DATA/AppData/ClipsCreator}/backend-screens:/screens
      - ${CLIPSCREATOR_APPDATA_DIR:-/DATA/AppData/ClipsCreator}/backend-videos:/videos
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  frontend:
    build: ${LEAGUECLIPS_SOURCE_DIR:-.}/frontend
    container_name: clips_frontend
    restart: unless-stopped
    user: "1000:1000"
    depends_on:
      - backend
    ports:
        - "3000:3000"                   # nur intern, Proxy published
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  frontend_sitcom:
    build: ${LEAGUECLIPS_SOURCE_DIR:-.}/frontend_sitcom
    container_name: clips_frontend_sitcom
    restart: unless-stopped
    user: "1000:1000"
    depends_on:
      - backend
    ports:
      - "3001:3001"                   # nur intern, Proxy published
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  frontend_tshirts:
    build: ${LEAGUECLIPS_SOURCE_DIR:-.}/frontend_tshirts
    container_name: clips_frontend_tshirts
    restart: unless-stopped
    user: "1000:1000"
    depends_on:
      - ollama
      - image_generator
    ports:
      - "${TSHIRT_FRONTEND_PORT:-3002}:3002"                   # nur intern, Proxy published
    environment:
      TSHIRT_OLLAMA_HOST: http://ollama:11434
      TSHIRT_OLLAMA_MODEL: ${TSHIRT_OLLAMA_MODEL:-qwen2.5:7b-instruct}
      TSHIRT_OLLAMA_NUM_PREDICT: ${TSHIRT_OLLAMA_NUM_PREDICT:-6500}
      TSHIRT_OLLAMA_TEMPERATURE: ${TSHIRT_OLLAMA_TEMPERATURE:-0.85}
      TSHIRT_GENERATE_INTERVAL_SECONDS: ${TSHIRT_GENERATE_INTERVAL_SECONDS:-3600}
      TSHIRT_IMAGE_PROVIDER: ${TSHIRT_IMAGE_PROVIDER:-local_diffusion}
      TSHIRT_LOCAL_IMAGE_HOST: http://image_generator:7860
      TSHIRT_LOCAL_IMAGE_SIZE: ${TSHIRT_LOCAL_IMAGE_SIZE:-1024}
      TSHIRT_LOCAL_IMAGE_STEPS: ${TSHIRT_LOCAL_IMAGE_STEPS:-28}
      TSHIRT_LOCAL_IMAGE_GUIDANCE_SCALE: ${TSHIRT_LOCAL_IMAGE_GUIDANCE_SCALE:-7.0}
      TSHIRT_LOCAL_IMAGE_TIMEOUT_SECONDS: ${TSHIRT_LOCAL_IMAGE_TIMEOUT_SECONDS:-3600}
      TSHIRT_POLLINATIONS_API_KEY: ${TSHIRT_POLLINATIONS_API_KEY:-}
      TSHIRT_POLLINATIONS_MODEL: ${TSHIRT_POLLINATIONS_MODEL:-flux}
      TSHIRT_IMAGE_SIZE: ${TSHIRT_IMAGE_SIZE:-2048}
      TSHIRT_MAX_DESIGNS: ${TSHIRT_MAX_DESIGNS:-80}
      HOME: /data
    volumes:
      - ${CLIPSCREATOR_APPDATA_DIR:-/DATA/AppData/ClipsCreator}/tshirt-designer:/data
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  image_generator:
    build: ${LEAGUECLIPS_SOURCE_DIR:-.}/image_generator
    container_name: clips_image_generator
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "${IMAGEGEN_HOST_PORT:-7860}:7860"                   # nur intern, Proxy published
    environment:
      IMAGEGEN_MODEL: ${IMAGEGEN_MODEL:-stabilityai/stable-diffusion-xl-base-1.0}
      IMAGEGEN_DEVICE: ${IMAGEGEN_DEVICE:-auto}
      IMAGEGEN_DTYPE: ${IMAGEGEN_DTYPE:-auto}
      IMAGEGEN_WIDTH: ${IMAGEGEN_WIDTH:-1024}
      IMAGEGEN_HEIGHT: ${IMAGEGEN_HEIGHT:-1024}
      IMAGEGEN_STEPS: ${IMAGEGEN_STEPS:-28}
      IMAGEGEN_GUIDANCE_SCALE: ${IMAGEGEN_GUIDANCE_SCALE:-7.0}
      IMAGEGEN_MODEL_CPU_OFFLOAD: ${IMAGEGEN_MODEL_CPU_OFFLOAD:-true}
      HOME: /data
      HF_HOME: /data/huggingface
      TRANSFORMERS_CACHE: /data/huggingface
      DIFFUSERS_CACHE: /data/huggingface
    volumes:
      - ${CLIPSCREATOR_APPDATA_DIR:-/DATA/AppData/ClipsCreator}/image-generator:/data
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  redis:
    image: redis:7-alpine
    container_name: clips_redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    # Optional: "--requirepass", "STRONG_PASSWORD" falls extern zugänglich (besser: intern ohne Publish)
    volumes:
      - ${CLIPSCREATOR_APPDATA_DIR:-/DATA/AppData/ClipsCreator}/redis:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  ollama:
    image: ollama/ollama:latest
    container_name: clips_ollama
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "11434:11434"
    volumes:
      - ${CLIPSCREATOR_APPDATA_DIR:-/DATA/AppData/ClipsCreator}/ollama:/root/.ollama
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

networks:
  default:
    name: leagueclips_net

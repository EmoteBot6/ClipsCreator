<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}League Clips{% endblock %}</title>
  <style>
    :root {
      --bg: #ecf3f3;
      --bg-strong: #dbe8e6;
      --card: rgba(255, 255, 255, 0.92);
      --card-strong: #ffffff;
      --text: #142021;
      --muted: #627473;
      --primary: #0f766e;
      --primary-hover: #115e59;
      --success: #15803d;
      --success-hover: #166534;
      --danger: #b42318;
      --danger-hover: #8f1d15;
      --warning: #b7791f;
      --border: #ccdad7;
      --border-strong: #aabfba;
      --nav-bg: rgba(13, 31, 32, 0.94);
      --nav-text: #f7fbfa;
      --nav-muted: #b6c7c4;
      --shadow: 0 18px 42px rgba(20, 42, 43, 0.11);
      --shadow-soft: 0 12px 28px rgba(20, 42, 43, 0.08);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Aptos", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 95% 4%, rgba(15, 118, 110, 0.18) 0%, transparent 30%),
        radial-gradient(circle at 4% 0%, rgba(245, 158, 11, 0.14) 0%, transparent 28%),
        linear-gradient(135deg, var(--bg), var(--bg-strong)),
        var(--bg);
      background-attachment: fixed;
    }

    a {
      color: inherit;
    }

    .shell {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
      padding: 18px 20px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 24px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.06), transparent),
        var(--nav-bg);
      color: var(--nav-text);
      box-shadow: var(--shadow);
    }

    .brand {
      min-width: 0;
    }

    .brand-kicker {
      margin: 0 0 4px 0;
      color: var(--nav-muted);
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .brand-title {
      margin: 0;
      font-size: 1.35rem;
      line-height: 1.2;
    }

    .brand-copy {
      margin: 4px 0 0 0;
      color: var(--nav-muted);
      font-size: 14px;
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 10px 16px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      color: var(--nav-text);
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .nav-link:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.06);
    }

    .nav-link.active {
      background: linear-gradient(135deg, #14b8a6, #0f766e);
      border-color: transparent;
    }

    .layout {
      display: grid;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      padding: 20px;
      backdrop-filter: blur(10px);
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      padding: 24px;
      background:
        linear-gradient(135deg, rgba(15, 118, 110, 0.13), rgba(245, 158, 11, 0.09)),
        var(--card);
    }

    .hero-card::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      right: -70px;
      top: -80px;
      border-radius: 999px;
      background: rgba(15, 118, 110, 0.12);
      pointer-events: none;
    }

    .section-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 14px;
    }

    .section-header h2,
    .section-title {
      margin: 0;
    }

    .section-copy {
      margin: 6px 0 0 0;
      max-width: 760px;
    }

    .page-title {
      margin: 0 0 8px 0;
      font-size: clamp(1.65rem, 3vw, 2.35rem);
      line-height: 1.15;
    }

    h2 {
      letter-spacing: -0.01em;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .form-stack {
      display: grid;
      gap: 12px;
    }

    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .input-wide {
      min-width: min(420px, 100%);
      width: min(720px, 100%);
    }

    .input-medium {
      min-width: min(360px, 100%);
      width: min(520px, 100%);
    }

    .checkbox-row {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 650;
    }

    .button {
      border: none;
      border-radius: var(--radius-sm);
      padding: 10px 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(20, 42, 43, 0.08);
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(20, 42, 43, 0.12);
    }

    .button-primary {
      background: var(--primary);
      color: #fff;
    }

    .button-primary:hover {
      background: var(--primary-hover);
    }

    .button-success {
      background: var(--success);
      color: #fff;
    }

    .button-success:hover {
      background: var(--success-hover);
    }

    .button-danger {
      background: var(--danger);
      color: #fff;
    }

    .button-danger:hover {
      background: var(--danger-hover);
    }

    .button[disabled] {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
      box-shadow: none;
    }

    .muted {
      color: var(--muted);
    }

    .status-box {
      margin-top: 12px;
      padding: 14px;
      border-radius: var(--radius-md);
      border: 1px dashed var(--border-strong);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.75), rgba(238, 247, 245, 0.75));
      min-height: 58px;
    }

    .status-line {
      margin: 12px 0 0 0;
      padding: 12px 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.65);
    }

    .surface {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.7);
      padding: 14px;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }

    .result-card {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px;
      background: var(--card-strong);
      box-shadow: 0 8px 22px rgba(20, 42, 43, 0.06);
    }

    .result-card video,
    .result-card img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 10px;
      background: #000;
    }

    .links,
    .clip-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }

    .pill-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #f8fbfa;
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      font-weight: 650;
    }

    input[type="text"],
    input[type="file"],
    select,
    textarea {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
      min-height: 42px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input[type="text"]:focus,
    input[type="file"]:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.13);
    }

    textarea {
      resize: vertical;
      min-height: 90px;
      font-family: Consolas, Monaco, monospace;
    }

    .download-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 8px 12px;
      text-decoration: none;
      background: var(--success);
      color: #fff;
      border-radius: var(--radius-sm);
      font-weight: 600;
    }

    .download-link.secondary {
      background: #334155;
    }

    .wrap-title {
      margin: 0 0 8px 0;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    @media (max-width: 760px) {
      .shell {
        padding: 16px;
      }

      .topbar {
        padding: 14px;
        border-radius: 18px;
      }

      .page-title {
        font-size: 1.4rem;
      }

      .nav-links,
      .nav-link,
      .button,
      .toolbar,
      .form-row,
      input[type="text"],
      input[type="file"],
      select {
        width: 100%;
      }
    }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <p class="brand-kicker">League Clips Toolkit</p>
        <h1 class="brand-title">League Vertical Clip Studio</h1>
        <p class="brand-copy">Split VODs, render one clip with the League layout, or make a centered mobile version with subtitles only.</p>
      </div>
      <nav class="nav-links" aria-label="Primary">
        <a class="nav-link {% if active_page == 'multi_clip' %}active{% endif %}" href="/multi-clip">Multi Clip Split</a>
        <a class="nav-link {% if active_page == 'single_clip' %}active{% endif %}" href="/single-clip">Single Clip Render</a>
        <a class="nav-link {% if active_page == 'centered_mobile' %}active{% endif %}" href="/centered-mobile">Centered Mobile</a>
      </nav>
    </header>
    <main class="layout">
      {% block content %}{% endblock %}
    </main>
  </div>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
